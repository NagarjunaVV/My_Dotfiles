# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃      N A G A R J U N A ' S   A N I M A T I O N S                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

animations {
    enabled = true

    # --- CUSTOM BEZIER CURVES ---
    # Format: bezier = name, x1, y1, x2, y2
    
    # The "Overshoot": Speeds up, goes slightly past the target, and bounces back. Fun for opening apps.
    bezier = snappyBounce, 0.175, 0.885, 0.32, 1.275 
    
    # The "Smooth Exit": Starts fast, slows down perfectly at the end. Great for closing apps.
    bezier = smoothOut, 0.36, 0, 0.66, -0.56 
    
    # The "Linear": Constant speed. Used for rotating border colors.
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    
    # The "Swipe": Fast and sharp. Perfect for quickly switching workspaces.
    bezier = workspaceSwipe, 0.65, 0, 0.35, 1 

    # --- APPLYING THE CURVES ---
    
    # Windows popping in (duration: 4, using our bouncy curve)
    animation = windowsIn, 1, 4, snappyBounce, popin 80%
    
    # Windows closing (duration: 4, using the smooth exit curve)
    animation = windowsOut, 1, 4, smoothOut, popin 80%
    
    # Moving windows around the screen
    animation = windowsMove, 1, 4, snappyBounce, slide
    
    # The glowing border effect (optional, but high rice factor)
    animation = border, 1, 10, default
    animation = borderangle, 1, 30, linear, loop 
    
    # Fading effects for menus like Rofi
    animation = fade, 1, 3, default
    
    # Workspace swiping (snappy and fast for productivity)
    animation = workspaces, 1, 4, workspaceSwipe, slide
}
